[pytest]
# Configuración de pytest para el backend de Sell & Buy

# Ubicación de tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Salida
addopts = 
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -p no:warnings
    --cov=app
    --cov-report=html
    --cov-report=term-missing
    --cov-report=xml
    --cov-branch
    --cov-fail-under=70

# Variables de entorno para tests
env = 
    ENVIRONMENT=testing

# Configuración de asyncio
asyncio_mode = auto

# Markers para organizar tests
markers =
    integration: tests de integración con BD
    unit: tests unitarios
    auth: tests de autenticación
    slow: tests lentos
    smoke: tests básicos de funcionalidad
